<!DOCTYPE html>
<html>
<head>
<title>Perceptron - L vs T</title>
<style>
body { font-family: Arial; max-width: 600px; margin: 20px auto; }
.grid { display: grid; grid-template-columns: repeat(5,40px); gap: 2px; width: fit-content; margin: 10px auto; }
.cell { width: 40px; height: 40px; border: 1px solid #999; background: #fff; cursor: pointer; }
.cell.on { background: #333; }
button { padding: 6px 14px; margin: 3px; }
#result { font-size: 22px; font-weight: bold; text-align: center; margin: 10px; }
#log { font-family: monospace; font-size: 11px; background: #f5f5f5; padding: 8px; height: 100px; overflow-y: auto; }
.samples { display: flex; flex-wrap: wrap; gap: 3px; margin: 10px 0; }
.mini { display: grid; grid-template-columns: repeat(5,6px); border: 2px solid #ccc; }
.mini div { width: 6px; height: 6px; background: #eee; }
.mini div.on { background: #333; }
.mini.l { border-color: green; }
.mini.t { border-color: red; }
</style>
</head>
<body>
<h2 style="text-align:center">Perceptron: L vs T</h2>

<div class="grid" id="grid"></div>
<div style="text-align:center">
  <button onclick="classify()">Classify</button>
  <button onclick="grid.fill(0);render();result.textContent=''">Clear</button>
  <button onclick="add(1)">+ L</button>
  <button onclick="add(0)">+ T</button>
</div>
<div id="result"></div>

<div>
  <button onclick="train()">Train</button>
  <button onclick="gen()">Generate 100 Samples</button>
  <span>Samples: <b id="cnt">0</b> | Accuracy: <b id="acc">—</b></span>
</div>
<div id="log"></div>
<div class="samples" id="samp"></div>

<script>
var w = Array(25).fill(0), b = 0, data = [], grid = Array(25).fill(0);
var result = document.getElementById('result');

var el = document.getElementById('grid');
for (var i = 0; i < 25; i++) {
  var c = document.createElement('div');
  c.className = 'cell';
  c.dataset.i = i;
  c.onmousedown = function(){ grid[this.dataset.i] ^= 1; render(); };
  c.onmouseenter = function(e){ if(e.buttons){ grid[this.dataset.i] ^= 1; render(); }};
  el.appendChild(c);
}

function render() {
  var cells = document.querySelectorAll('.cell');
  for (var i = 0; i < 25; i++) cells[i].className = grid[i] ? 'cell on' : 'cell';
}

function predict(x) {
  var s = b;
  for (var i = 0; i < 25; i++) s += w[i] * x[i];
  return s >= 0 ? 1 : 0;
}

function classify() {
  result.textContent = predict(grid) ? 'L' : 'T';
}

function add(label) {
  data.push({ x: grid.slice(), y: label });
  grid.fill(0); render(); result.textContent = '';
  showData();
}

function train() {
  if (!data.length) return;
  var lr = 0.1, ep = 100, correct = 0;
  for (var e = 0; e < ep; e++) {
    correct = 0;
    for (var j = 0; j < data.length; j++) {
      var p = predict(data[j].x), err = data[j].y - p;
      if (!err) { correct++; continue; }
      for (var i = 0; i < 25; i++) w[i] += lr * err * data[j].x[i];
      b += lr * err;
    }
    if (correct === data.length) break;
  }
  document.getElementById('acc').textContent = ((correct/data.length)*100).toFixed(1)+'%';
  document.getElementById('log').textContent += 'Trained. Accuracy: '+((correct/data.length)*100).toFixed(1)+'%\n';
}

var Ls = [[0,5,10,15,20,21,22],[4,9,14,19,24,23,22],[0,5,10,15,16,17],[2,7,12,17,22,21,20],
  [3,8,13,18,23,24],[1,6,11,16,21,22],[0,5,10,15,20,21],[4,9,14,19,24,23],
  [0,5,10,15,16],[1,6,11,16,17],[2,7,12,17,18],[3,8,13,18,19],
  [20,15,10,11,12],[24,19,14,13,12],[22,21,20,15,10],[24,23,22,17,12]];
var Ts = [[0,1,2,3,4,7,12],[20,21,22,23,24,17,12],[0,5,10,15,20,6,11],[4,9,14,19,24,8,13],
  [0,1,2,3,7,12],[1,2,3,7,12,17],[20,21,22,23,17,12],[5,6,7,8,9,12,17],
  [10,11,12,13,14,7,17],[15,16,17,18,19,12,7],[1,2,3,7,12],[6,7,8,12,17],
  [11,12,13,7,17],[10,11,12,16,21],[11,12,13,17,22],[6,7,8,12,17],
  [0,1,2,3,4,12,17],[10,11,12,13,14,2,7],[0,1,2,3,4,7,12,17]];

function make(patterns, v) {
  var g = Array(25).fill(0);
  patterns[v % patterns.length].forEach(function(i){ g[i]=1; });
  return g;
}

function noisy(g) {
  return g.map(function(v){ return Math.random()<0.05 ? v^1 : v; });
}

function gen() {
  data = [];
  for (var v = 0; v < 16; v++) {
    data.push({ x: make(Ls,v), y: 1 });
    data.push({ x: make(Ts,v), y: 0 });
  }
  for (var r = 0; r < 2; r++)
    for (var v = 0; v < 16; v++) {
      data.push({ x: noisy(make(Ls,v)), y: 1 });
      data.push({ x: noisy(make(Ts,v)), y: 0 });
    }
  for (var v = 0; v < 2; v++) {
    data.push({ x: noisy(make(Ls,v)), y: 1 });
    data.push({ x: noisy(make(Ts,v)), y: 0 });
  }
  showData();
}

function showData() {
  document.getElementById('cnt').textContent = data.length;
  var d = document.getElementById('samp'); d.innerHTML = '';
  for (var j = 0; j < Math.min(data.length,60); j++) {
    var m = document.createElement('div');
    m.className = 'mini ' + (data[j].y ? 'l' : 't');
    for (var i = 0; i < 25; i++) {
      var c = document.createElement('div');
      if (data[j].x[i]) c.className = 'on';
      m.appendChild(c);
    }
    d.appendChild(m);
  }
}
</script>
</body>
</html>
